spring.application.name=luberight-backend
server.port=8081

# Load local env properties for secrets (DB credentials).
spring.config.import=optional:file:./.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=${CACHE_SCHEMA_LOCATION:classpath:sql/local_cache_tables.sql}

# Sync configuration
remote.api.base-url=${REMOTE_API_BASE_URL:http://localhost:8082}
sync.interval=${SYNC_INTERVAL:5000}

management.endpoints.web.exposure.include=health,info
